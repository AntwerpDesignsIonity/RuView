[env:esp32s3_n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 460800
upload_speed = 460800
upload_protocol = esptool
board_upload.flash_size = 16MB
build_flags =
	-DBOARD_HAS_PSRAM

; Leave upload_port and monitor_port unset so PlatformIO auto-detects
; the connected ESP32-S3 device.
; PlatformIO exposes the generic esp32-s3-devkitc-1 board ID, so this
; environment uses that ID with 16 MB flash overrides for N16R8-style boards.
